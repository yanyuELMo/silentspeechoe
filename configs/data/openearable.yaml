name: OpenEarable 2.0
root_dir: data/raw
processed_dir: data/processed
metadata_file: data/metadata/events.csv
sensors:
  - bone_acc
  - imu
todo: "Expand to barometer / lowrate_merged when multi-modal experiments begin."

# IMU preprocessing settings.
imu:
  raw_root: data/raw
  metadata_file: data/metadata/events.csv
  sides:
    - left
  channels:
    - acc.x
    - acc.y
    - acc.z
    - gyro.x
    - gyro.y
    - gyro.z
    - mag.x
    - mag.y
    - mag.z
  target_sample_rate: 200
  padding_sec: 0.0
  min_length: 20
  normalize: false
